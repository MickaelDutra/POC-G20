version: "3.9"

services:
  database:
    image: postgres:14
    container_name: app_database
    restart: unless-stopped
    environment:
      POSTGRES_DB:       intellifinance
      POSTGRES_USER:     postegre
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data  
      - ./backend/data/data.sql:/docker-entrypoint-initdb.d/init.sql:ro  
    networks:
      - backend_network     
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postegre -d intellifinance"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app_backend
    restart: unless-stopped
    ports:
    - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL:             jdbc:postgresql://database:5432/intellifinance
      SPRING_DATASOURCE_USERNAME:        postegre
      SPRING_DATASOURCE_PASSWORD:        1234
      SPRING_JPA_HIBERNATE_DDL_AUTO:     validate
      SERVER_PORT:                       8080
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend_network     
      - frontend_network    
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app_frontend
    restart: unless-stopped
    ports:
      - "4200:80"           
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend_network    

networks:
  frontend_network:
    driver: bridge
    name: frontend_network
  backend_network:
    driver: bridge
    name: backend_network

volumes:
  postgres_data:
    driver: local
    name: app_postgres_data   