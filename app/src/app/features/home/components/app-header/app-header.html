<header class="app-header">
  <div class="app-header__inner">
    <button class="app-header__avatar" type="button" aria-label="Perfil">
      <span>JO</span>
    </button>

    <h1 class="app-header__title">IntelliFinance</h1>

    <div class="app-header__actions">
      <button class="app-header__ia-btn" type="button" aria-label="Assistente IA">
        <div class="app-header__ia-glow"></div>
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          <circle cx="9" cy="10" r="1" fill="currentColor" stroke="none" />
          <circle cx="12" cy="10" r="1" fill="currentColor" stroke="none" />
          <circle cx="15" cy="10" r="1" fill="currentColor" stroke="none" />
        </svg>
        <span class="app-header__ia-label">IA</span>
      </button>

      <button class="app-header__bell" type="button" aria-label="Notificações">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span class="app-header__badge">3</span>
      </button>
    </div>
  </div>
</header>
