<section class="quick-access">
  <div class="quick-access__header">
    <h2 class="quick-access__title">Para o seu dia a dia</h2>
    <button class="quick-access__link" type="button">Ver tudo</button>
  </div>

  <div class="quick-access__list">
    @for (item of items; track item.label) {
      <button class="quick-access__item" type="button">
        <div class="quick-access__item-icon">
          @switch (item.icon) {
            @case ('loan') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
            }
            @case ('invest') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
              </svg>
            }
            @case ('card') {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
              </svg>
            }
          }
        </div>

        <div class="quick-access__item-text">
          <span class="quick-access__item-label">{{ item.label }}</span>
          <span class="quick-access__item-sublabel">{{ item.sublabel }}</span>
        </div>

        <svg class="quick-access__item-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    }
  </div>
</section>
