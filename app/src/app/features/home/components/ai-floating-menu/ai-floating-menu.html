<button
  class="ai-fab"
  [class.ai-fab--expanded]="expanded()"
  type="button"
  aria-label="Pergunte para a IA"
>
  <div class="ai-fab__ring-wrap">
    <svg class="ai-fab__ring" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="orb-grad-open" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#BB2038" />
          <stop offset="45%" stop-color="#515B97" />
          <stop offset="100%" stop-color="#343B64" />
        </linearGradient>
        <linearGradient id="orb-grad-closed" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#BB2038">
            <animate attributeName="stop-color" values="#BB2038;#515B97;#343B64;#BB2038" dur="3s" repeatCount="indefinite" />
          </stop>
          <stop offset="50%" stop-color="#515B97">
            <animate attributeName="stop-color" values="#515B97;#343B64;#BB2038;#515B97" dur="3s" repeatCount="indefinite" />
          </stop>
          <stop offset="100%" stop-color="#343B64">
            <animate attributeName="stop-color" values="#343B64;#BB2038;#515B97;#343B64" dur="3s" repeatCount="indefinite" />
          </stop>
        </linearGradient>
      </defs>

      <circle
        class="ai-fab__arc"
        cx="20"
        cy="20"
        r="14"
        fill="none"
        [attr.stroke]="expanded() ? 'url(#orb-grad-open)' : 'url(#orb-grad-closed)'"
        stroke-width="5"
        stroke-linecap="round"
      />
    </svg>
  </div>

  <span class="ai-fab__label">Pergunte para a IA</span>
</button>
